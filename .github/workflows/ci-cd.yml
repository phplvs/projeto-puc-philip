name: CI/CD - Somativa

on:
  pull_request:
    branches:
      - main

jobs:
  # CI - Lint com Flake8
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Flake8
        run: flake8 main.py

  # CD - Empacotamento (Entrega)
  deliver:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Create zip file
        run: zip zip-teste.zip main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zip-teste.zip
          path: zip-teste.zip

  # CD - Deploy Simulado
  deploy:
    runs-on: ubuntu-latest
    needs: deliver
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: zip-teste.zip

      - name: Display structure of downloaded files
        run: ls -R

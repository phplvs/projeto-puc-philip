name: CI/CD - Somativa

on:
  pull_request:
    branches:
      - main

jobs:
  # Job de Continuous Integration
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Install Python and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint

      - name: Run Pylint
        run: pylint main.py

  # Job de Continuous Delivery (simulado)
  cd:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Simulate packaging
        run: zip projeto.zip main.py

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: projeto.zip
          path: projeto.zip

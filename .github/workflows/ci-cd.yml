     name: CI/CD - Somativa

on:
  pull_request:
    branches:
      - main

jobs:
  # Job de Continuous Integration (CI)
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out código do repositório
        uses: actions/checkout@v4

      - name: Instalar dependências e Pylint
        run: |
          python -m pip install --upgrade pip
          pip install pylint

      - name: Rodar Pylint para análise de código
        run: pylint main.py

  # Job de Continuous Delivery (CD) - Simulado
  cd:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Check out código do repositório
        uses: actions/checkout@v4

      - name: Simulando empacotamento
        run: zip projeto.zip main.py

      - name: Fazer upload do pacote
        uses: actions/upload-artifact@v4
        with:
          name: projeto.zip
          path: projeto.zip
